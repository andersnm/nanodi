name: Test

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test:dist
        working-directory: ./nanodi-test
      - run: npm run pack
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: '*.tgz'

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # publish only on version tags
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'

      - run: npm ci
      - run: npm run build

      - run: npm publish --access public --provenance -w nanodi
      - run: npm publish --access public --provenance -w nanodi-express
